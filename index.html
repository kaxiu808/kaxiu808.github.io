<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>博客</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- docsify的主题样式 这个链接，你可以加载 Docsify 的 Vue 主题样式，使你的 Docsify 文档具有 Vue 风格的外观和样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- 侧边栏插件的样式  这个插件可以让你的 Docsify 侧边栏具有折叠和展开的功能，使得用户可以更灵活地控制侧边栏的显示状态  -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />

 


</head>
<body>
  <nav>
    <a href="#/zh-cn/">中文</a>
  </nav>
  <div id="app"></div>

  <!--先引入Docsify的核心库 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4.11.5/dist/docsify.min.js"></script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4.11.5"></script>
  <!-- 锚点导航插件 -->
  <script src="https://unpkg.com/docsify-anchor-navigation/dist/js/anchor-navigation.min.js"></script>
  <!--搜索插件-->
  <!--它为你的Docsify项目添加了搜索功能。这个插件依赖于Docsify的核心库，所以需要确保在引入搜索插件之前已经引入了Docsify的核心库。 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.js"></script>
  <!--复制到剪贴板 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- 侧边栏折叠插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
   <!-- 分页插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

 <script>
    window.$docsify = {
      name: 'kaxiu的博客',
      repo: '',
      alias: {'/.*/_sidebar.md': '/_sidebar.md'},
      // 配置侧边栏后自动激活链接
      loadSidebar: true, // 增加，自动加载侧边栏
      autoHeaderLinks: true ,// 点击标题跳转到相应内容
      coverpage: false, // 开启封面
      loadNavbar: true, // 增加，自动加载导航栏
      subMaxLevel: 4, // 目录最大层级
      auto2top: true,// 切换页面后是否自动跳转到页面顶部
     
      
     // 搜索框的完整配置参数
     search: {
        maxAge: 8640000, // 过期时间，单位毫秒，默认一天
        paths: 'auto', // or 'auto'
        placeholder: '输入内容搜索',
        noData: '未检索到结果',
        depth: 6, // 搜索标题的最大程级, 1 - 6
        hideOtherSidebarContent: false, // 是否隐藏其他侧边栏内容
     },
   
    anchorNavigation: {
    isEnable: true, // 开启锚点导航
  },
    pagination: {
    maxPages: 10, // 最大页数
    size: 10, // 每页文档数量
    prevText: '上一页',
    nextText: '下一页',
    crossChapter: true, // 跨章节
  }
   
    };

  </script>

</body>
</html>
