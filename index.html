<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>博客</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
 
 
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'kaxiu的博客',
      repo: '',
      alias: {'/.*/_sidebar.md': '/_sidebar.md'},
      // 配置侧边栏后自动激活链接
      loadSidebar: true, // 增加，自动加载侧边栏
      coverpage: false, // 开启封面
      loadNavbar: true, // 增加，自动加载导航栏
      subMaxLevel: 4, // 目录最大层级
      auto2top: true,// 切换页面后是否自动跳转到页面顶部
     // 搜索框的完整配置参数
     search: {
        maxAge: 8640000, // 过期时间，单位毫秒，默认一天
        paths: 'auto', // or 'auto'
        placeholder: '输入内容搜索',
        noData: '未检索到结果',
        depth: 6, // 搜索标题的最大程级, 1 - 6
        hideOtherSidebarContent: false, // 是否隐藏其他侧边栏内容

     },
      plugins: [
      DocsifyAnchorNavigation.create()
    ]
  
    }

  </script>

  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!--搜索插件-->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

  <!-- plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://unpkg.com/docsify-anchor-navigation/dist/js/anchor-navigation.min.js"></script>
  
  

<style type="text/css">
.content {
  overflow: auto;
}
</style>

</body>
</html>
